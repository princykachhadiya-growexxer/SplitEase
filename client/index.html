<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SplitEase — Split Expenses Effortlessly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <!--
      Anti-flash theme script — runs BEFORE React hydrates.
      Must be inline (no defer/async) so it executes synchronously.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('splitease-theme');
          var preferred = stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)
            ? 'dark'
            : 'light';
          if (preferred === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', preferred);
        } catch (e) { /* private browsing / SSR */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
